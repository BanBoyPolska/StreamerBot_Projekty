<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <!-- Wariant 3: Tech/GPS z wykresem danych -->
  <defs>
    <linearGradient id="gbg" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0D9488"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="gwhite" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="white" stop-opacity="0.95"/>
      <stop offset="1" stop-color="white" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="48" fill="url(#gbg)"/>

  <!-- Tło mapy - siatka -->
  <line x1="30" y1="80" x2="226" y2="80" stroke="white" stroke-width="1" opacity="0.12"/>
  <line x1="30" y1="110" x2="226" y2="110" stroke="white" stroke-width="1" opacity="0.12"/>
  <line x1="30" y1="140" x2="226" y2="140" stroke="white" stroke-width="1" opacity="0.12"/>
  <line x1="70" y1="50" x2="70" y2="220" stroke="white" stroke-width="1" opacity="0.12"/>
  <line x1="120" y1="50" x2="120" y2="220" stroke="white" stroke-width="1" opacity="0.12"/>
  <line x1="170" y1="50" x2="170" y2="220" stroke="white" stroke-width="1" opacity="0.12"/>
  <line x1="220" y1="50" x2="220" y2="220" stroke="white" stroke-width="1" opacity="0.12"/>

  <!-- Trasa rowerowa na "mapie" -->
  <path d="M52 180C62 172 74 162 90 148C106 134 114 120 122 108C130 96 140 88 155 82C170 76 185 78 200 86" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>

  <!-- Punkt startowy -->
  <circle cx="52" cy="180" r="10" fill="white" opacity="0.9"/>
  <circle cx="52" cy="180" r="5" fill="url(#gbg)"/>

  <!-- Pin końcowy -->
  <path d="M188 62C188 53.2 195.2 46 204 46C212.8 46 220 53.2 220 62C220 74 204 88 204 88C204 88 188 74 188 62Z" fill="white"/>
  <circle cx="204" cy="62" r="7" fill="url(#gbg)"/>

  <!-- Wykres wysokości na dole -->
  <rect x="28" y="196" width="200" height="36" rx="8" fill="white" opacity="0.15"/>
  <polyline points="36,224 56,216 76,220 100,206 120,202 144,210 168,204 192,208 220,212" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Rower - mały symbol w rogu -->
  <circle cx="52" cy="60" r="18" stroke="white" stroke-width="5" opacity="0.85"/>
  <circle cx="100" cy="60" r="18" stroke="white" stroke-width="5" opacity="0.85"/>
  <path d="M52 60L64 34L78 60H52Z" stroke="white" stroke-width="5" stroke-linejoin="round" fill="none" opacity="0.85"/>
