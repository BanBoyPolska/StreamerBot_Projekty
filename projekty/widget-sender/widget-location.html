<!DOCTYPE html>
<html lang="pl"><head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:transparent;overflow:hidden;width:260px;height:90px;font-family:'JetBrains Mono',monospace;-webkit-font-smoothing:antialiased}
  .card{width:260px;height:90px;background:linear-gradient(135deg,rgba(10,15,18,0.88) 0%,rgba(14,20,24,0.82) 100%);border:1px solid rgba(79,152,163,0.25);border-radius:14px;padding:12px 18px;display:flex;flex-direction:column;justify-content:space-between;backdrop-filter:blur(12px);box-shadow:0 4px 24px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.04);position:relative;overflow:hidden}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#4f98a3,transparent)}
  .label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(79,152,163,0.7);display:flex;align-items:center;gap:5px}
  .city{font-size:26px;font-weight:800;color:#fff;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .country{font-size:10px;color:rgba(255,255,255,0.3)}
</style></head><body>
<div class="card">
  <div class="label">
    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="rgba(79,152,163,0.7)" stroke-width="2.5"><circle cx="12" cy="11" r="3"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
    Lokalizacja
  </div>
  <div class="city" id="city">—</div>
  <div class="country" id="country">—</div>
</div>
<script>
const SERVER = 'https://gps.banboypolska.deno.net';

async function poll(){
  try{
    const d=await(await fetch(SERVER+'/data',{cache:'no-cache'})).json();
    document.getElementById('city').textContent = d.city||'—';
    document.getElementById('country').textContent = d.country||'—';
  }catch{}
}
poll(); setInterval(poll,3000);
</script>
</body></html>
