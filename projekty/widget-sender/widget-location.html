<!DOCTYPE html>
<html lang="pl"><head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:transparent;overflow:hidden;width:300px;height:110px;-webkit-font-smoothing:antialiased;border-radius:16px}
  body{font-family:'JetBrains Mono',monospace}
  .card{width:300px;height:110px;background:rgba(8,13,16,0.92);border:1.5px solid rgba(79,152,163,0.4);border-radius:16px;padding:14px 20px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 2px 20px rgba(0,0,0,0.6);position:relative;overflow:hidden}
  .card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#4f98a3 0%,rgba(79,152,163,0.1) 70%,transparent 100%)}
  .label{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#4f98a3;opacity:.85;display:flex;align-items:center;gap:5px}
  .city{font-size:34px;font-weight:800;color:#fff;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .country{font-size:13px;color:rgba(255,255,255,0.4);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
</style></head><body>
<div class="card">
  <div class="label">📍 Lokalizacja</div>
  <div class="city" id="city">—</div>
  <div class="country" id="country">—</div>
</div>
<script>
let SERVER='https://gps.banboypolska.deno.net';

// ── AUTO-FETCH SERVER URL z GitHub Gist ──
const _GIST_ID = 'b8194117c4bb29f977bec88ec9a5c592';
async function _initServerUrl() {
  try {
    const r = await fetch(`https://api.github.com/gists/${_GIST_ID}`, {
      headers: { 'Accept': 'application/vnd.github.v3+json' }
    });
    const data = await r.json();
    const file = data.files['obs-gps-server-url.json'];
    if (file) {
      const parsed = JSON.parse(file.content);
      if (parsed.url) { SERVER = parsed.url; }
    }
  } catch(e) {}
}

async function poll(){
  try{
    const d=await(await fetch(SERVER+'/data',{cache:'no-cache'})).json();
    document.getElementById('city').textContent=d.city||'—';
    document.getElementById('country').textContent=d.country||'—';
  }catch{}
}
_initServerUrl().then(() => { poll();setInterval(poll,3000); });

// ── WIDGET VISIBILITY (panel moderacji) ──
(function initVisibility() {
  const WIDGET_KEY = 'location';
  let _visServer = '';

  async function checkVisibility() {
    if (!_visServer) return;
    try {
      const r = await fetch(_visServer + '/widgets', {cache: 'no-cache'});
      const state = await r.json();
      const visible = state[WIDGET_KEY] !== false;
      document.body.style.opacity = visible ? '1' : '0';
      document.body.style.pointerEvents = visible ? '' : 'none';
    } catch {}
  }

  // Czekaj az SERVER bedzie znany (ustawiony przez _initServerUrl)
  let _waitTries = 0;
  function waitForServer() {
    _waitTries++;
    const s = (typeof SERVER !== 'undefined') ? SERVER : '';
    const ready = s && !s.includes('deno.net') && !s.includes('pobieram');
    if (ready) {
      _visServer = s;
      checkVisibility();
      setInterval(checkVisibility, 2000);
    } else if (_waitTries > 8) {
      // Fallback: uzyj localhost jesli Gist nie odpowiedzial
      _visServer = 'http://localhost:1985';
      checkVisibility();
      setInterval(checkVisibility, 2000);
    } else {
      setTimeout(waitForServer, 500);
    }
  }
  waitForServer();
})();
</script></body></html>
