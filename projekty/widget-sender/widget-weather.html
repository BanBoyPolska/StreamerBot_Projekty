<!DOCTYPE html>
<html lang="pl"><head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:transparent;overflow:hidden;width:260px;height:140px;-webkit-font-smoothing:antialiased;border-radius:16px}
  body{font-family:'JetBrains Mono',monospace}
  .card{width:260px;height:140px;background:rgba(16,11,8,0.92);border:1.5px solid rgba(232,112,56,0.4);border-radius:16px;padding:12px 16px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 2px 20px rgba(0,0,0,0.6);position:relative;overflow:hidden}
  .card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#e87038 0%,rgba(232,112,56,0.1) 70%,transparent 100%)}
  .label{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#e87038;opacity:.85}
  .main{display:flex;align-items:center;gap:4px}
  .icon{width:64px;height:64px;object-fit:contain;filter:drop-shadow(0 0 8px rgba(232,112,56,0.35))}
  .icon-fallback{width:64px;height:64px;display:flex;align-items:center;justify-content:center;font-size:42px;line-height:1}
  .temps{display:flex;flex-direction:column;gap:0px}
  .val-row{display:flex;align-items:baseline;gap:6px}
  .val{font-size:58px;font-weight:800;line-height:1;color:#fff;letter-spacing:-3px}
  .unit{font-size:18px;font-weight:700;color:rgba(255,255,255,0.45)}
  .desc{font-size:12px;color:rgba(255,255,255,0.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;text-transform:capitalize}
</style></head><body>
<div class="card">
  <div class="label">Pogoda</div>
  <div class="main">
    <div id="iconWrap">
      <div class="icon-fallback" id="iconEmoji">⏳</div>
    </div>
    <div class="temps">
      <div class="val-row">
        <div class="val" id="val">--</div>
        <div class="unit">°C</div>
      </div>
    </div>
  </div>
  <div class="desc" id="desc">oczekiwanie…</div>
</div>
<script>
let SERVER='https://gps.banboypolska.deno.net';

// ── AUTO-FETCH SERVER URL z GitHub Gist ──
const _GIST_ID = 'b8194117c4bb29f977bec88ec9a5c592';
async function _initServerUrl() {
  try {
    const r = await fetch(`https://api.github.com/gists/${_GIST_ID}`, {
      headers: { 'Accept': 'application/vnd.github.v3+json' }
    });
    const data = await r.json();
    const file = data.files['obs-gps-server-url.json'];
    if (file) {
      const parsed = JSON.parse(file.content);
      if (parsed.url) { SERVER = parsed.url; }
    }
  } catch(e) {}
}

let lastIcon='';
function setIcon(code){
  if(!code||code===lastIcon) return; lastIcon=code;
  const wrap=document.getElementById('iconWrap');
  const img=document.createElement('img');
  img.className='icon';
  img.onload=()=>{ wrap.innerHTML=''; wrap.appendChild(img); };
  img.onerror=()=>{}; 
  img.src=`https://openweathermap.org/img/wn/${code}@2x.png`;
}
async function poll(){
  try{
    const d=await(await fetch(SERVER+'/data',{cache:'no-cache'})).json();
    document.getElementById('val').textContent=d.temp??'--';
    document.getElementById('desc').textContent=d.tempDesc||'—';
    if(d.weatherIconCode) setIcon(d.weatherIconCode);
    else document.getElementById('iconEmoji').textContent=d.weatherIcon||'🌡️';
  }catch{}
}
_initServerUrl().then(() => { poll();setInterval(poll,3000); });

// ── WIDGET VISIBILITY (panel moderacji) ──
(function initVisibility() {
  const WIDGET_KEY = 'weather';
  let _visServer = '';

  async function checkVisibility() {
    if (!_visServer) return;
    try {
      const r = await fetch(_visServer + '/widgets', {cache: 'no-cache'});
      const state = await r.json();
      const visible = state[WIDGET_KEY] !== false;
      document.body.style.opacity = visible ? '1' : '0';
      document.body.style.pointerEvents = visible ? '' : 'none';
    } catch {}
  }

  // Czekaj az SERVER bedzie znany (ustawiony przez _initServerUrl)
  let _waitTries = 0;
  function waitForServer() {
    _waitTries++;
    const s = (typeof SERVER !== 'undefined') ? SERVER : '';
    const ready = s && !s.includes('deno.net') && !s.includes('pobieram');
    if (ready) {
      _visServer = s;
      checkVisibility();
      setInterval(checkVisibility, 2000);
    } else if (_waitTries > 8) {
      // Fallback: uzyj localhost jesli Gist nie odpowiedzial
      _visServer = 'http://localhost:1985';
      checkVisibility();
      setInterval(checkVisibility, 2000);
    } else {
      setTimeout(waitForServer, 500);
    }
  }
  waitForServer();
})();
</script></body></html>
