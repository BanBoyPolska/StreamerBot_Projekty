<!DOCTYPE html>
<html lang="pl"><head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:transparent;overflow:hidden;width:260px;height:150px;font-family:'JetBrains Mono',monospace;-webkit-font-smoothing:antialiased}
  .card{
    width:260px;height:150px;
    background:linear-gradient(135deg,rgba(10,15,18,0.88) 0%,rgba(14,20,24,0.82) 100%);
    border:1px solid rgba(232,112,56,0.3);
    border-radius:14px;
    padding:14px 18px;
    display:flex;flex-direction:column;justify-content:space-between;
    backdrop-filter:blur(12px);
    box-shadow:0 4px 24px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.04);
    position:relative;overflow:hidden;
  }
  .card::before{content:'';position:absolute;top:0;left:0;right:60%;height:3px;background:linear-gradient(90deg,#e87038,transparent)}
  .label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(232,112,56,0.75)}
  .main-row{display:flex;align-items:center;gap:0px}
  .icon-wrap{position:relative;width:72px;height:72px;margin-right:4px;flex-shrink:0}
  .icon-wrap img{width:72px;height:72px;object-fit:contain;image-rendering:crisp-edges;filter:drop-shadow(0 0 8px rgba(232,112,56,0.4))}
  .icon-wrap .icon-glow{position:absolute;inset:0;background:radial-gradient(circle,rgba(232,112,56,0.12) 0%,transparent 70%);pointer-events:none}
  .icon-placeholder{width:72px;height:72px;display:flex;align-items:center;justify-content:center;font-size:40px}
  .temps{display:flex;flex-direction:column;gap:2px}
  .temp-main{display:flex;align-items:baseline;gap:4px}
  .val{font-size:52px;font-weight:800;line-height:1;color:#fff;letter-spacing:-2px}
  .unit{font-size:16px;font-weight:700;color:rgba(255,255,255,0.35)}
  .desc{font-size:11px;color:rgba(232,112,56,0.8);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px;margin-top:4px;text-transform:capitalize}
</style></head><body>
<div class="card">
  <div class="label">Pogoda</div>

  <div class="main-row">
    <div class="icon-wrap">
      <img id="wIcon" src="" alt="" style="display:none">
      <div class="icon-placeholder" id="wEmoji">⏳</div>
      <div class="icon-glow"></div>
    </div>
    <div class="temps">
      <div class="temp-main">
        <div class="val" id="val">--</div>
        <div class="unit">°C</div>
      </div>
    </div>
  </div>

  <div class="desc" id="desc">oczekiwanie na dane…</div>


</div>
<script>
const SERVER = sessionStorage.getItem('gps_srv') || prompt('Adres serwera Deno:','');
if(SERVER) sessionStorage.setItem('gps_srv', SERVER);

// Ikonka OWM — oficjalny CDN @2x (50x50 → skalujemy CSS do 72px)
// URL: https://openweathermap.org/img/wn/{icon}@2x.png
function setIcon(iconCode) {
  if (!iconCode) return;
  const img = document.getElementById('wIcon');
  const emoji = document.getElementById('wEmoji');
  const url = `https://openweathermap.org/img/wn/${iconCode}@2x.png`;
  img.onload = () => {
    img.style.display = '';
    emoji.style.display = 'none';
  };
  img.onerror = () => {
    // Fallback do emoji jeśli CDN niedostępny
    img.style.display = 'none';
    emoji.style.display = '';
  };
  img.src = url;
}

async function poll(){
  try{
    const d = await(await fetch(SERVER+'/data',{cache:'no-cache'})).json();

    // Temperatura
    document.getElementById('val').textContent   = d.temp ?? '--';

    // Opis
    document.getElementById('desc').textContent  = d.tempDesc || '—';

    // Ikona OWM
    if (d.weatherIconCode) {
      setIcon(d.weatherIconCode);
    } else if (d.weatherIcon) {
      // Fallback: emoji z sendera
      document.getElementById('wEmoji').textContent = d.weatherIcon;
    }

    // Dane dodatkowe
  }catch{}
}
poll(); setInterval(poll,3000);
</script>
</body></html>
