<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OBS Widget Panel — Moderacja</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding: 20px;
  }
  h1 {
    font-size: 20px;
    font-weight: 600;
    color: #58a6ff;
    margin-bottom: 4px;
  }
  .subtitle {
    font-size: 13px;
    color: #8b949e;
    margin-bottom: 24px;
  }
  .status-bar {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 20px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #484f58; flex-shrink: 0; }
  .dot.online { background: #3fb950; box-shadow: 0 0 6px #3fb950; }
  .dot.offline { background: #f85149; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
  }
  .card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color .2s;
  }
  .card.active { border-color: #3fb950; }
  .card.inactive { border-color: #f85149; opacity: .6; }
  .card-top {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .icon { font-size: 22px; }
  .name { font-size: 14px; font-weight: 600; }
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .toggle-label { font-size: 12px; color: #8b949e; }
  .toggle {
    position: relative;
    width: 44px;
    height: 24px;
    flex-shrink: 0;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute;
    inset: 0;
    background: #484f58;
    border-radius: 24px;
    cursor: pointer;
    transition: .2s;
  }
  .slider:before {
    content: '';
    position: absolute;
    width: 18px; height: 18px;
    left: 3px; top: 3px;
    background: #fff;
    border-radius: 50%;
    transition: .2s;
  }
  input:checked + .slider { background: #3fb950; }
  input:checked + .slider:before { transform: translateX(20px); }

  /* Tabs */
  .tabs { display:flex; gap:4px; margin-bottom:20px; }
  .tab { padding:8px 18px; border-radius:6px; border:1px solid #30363d;
    background:#21262d; color:#8b949e; font-size:13px; cursor:pointer; transition:.15s; }
  .tab.active { background:#58a6ff22; border-color:#58a6ff; color:#58a6ff; }
  .section { display:none; }
  .section.active { display:block; }

  /* Layout canvas */
  .canvas-wrap { position:relative; width:100%; aspect-ratio:16/9; background:#0a0d0a;
    border:1px solid #30363d; border-radius:8px; overflow:hidden; margin-bottom:12px; min-height:200px; }
  .canvas-inner { position:absolute; inset:0; width:100%; height:100%; }
  .w-proxy { position:absolute; background:rgba(88,166,255,0.15); border:1.5px solid #58a6ff88;
    border-radius:6px; cursor:grab; user-select:none; display:flex; align-items:center;
    justify-content:center; font-size:10px; color:#58a6ff; font-weight:600;
    text-align:center; transition:border-color .15s, background .15s; box-sizing:border-box; }
  .w-proxy:hover { background:rgba(88,166,255,0.28); border-color:#58a6ff; }
  .w-proxy.dragging { cursor:grabbing; background:rgba(88,166,255,0.4); border-color:#58a6ff;
    box-shadow:0 4px 20px rgba(88,166,255,0.3); z-index:100; }
  .w-proxy.hidden-w { opacity:0.25; border-color:#f8514944; background:rgba(248,81,73,0.08); }
  .btn-apply { padding:9px 20px; border-radius:6px; border:none; background:#238636;
    color:#fff; font-size:13px; font-weight:600; cursor:pointer; transition:background .15s; }
  .btn-apply:hover { background:#2ea043; }
  .btn-reset { padding:9px 16px; border-radius:6px; border:1px solid #30363d;
    background:#21262d; color:#8b949e; font-size:13px; cursor:pointer; margin-left:8px; }
  .layout-actions { display:flex; align-items:center; gap:8px; margin-top:10px; }
  .layout-info { font-size:11px; color:#8b949e; }

  .btn-all {
    padding: 8px 16px;
    border-radius: 6px;
    border: 1px solid #30363d;
    background: #21262d;
    color: #e6edf3;
    font-size: 13px;
    cursor: pointer;
    transition: background .15s;
  }
  .btn-all:hover { background: #30363d; }
  .btn-all.green { border-color: #3fb950; color: #3fb950; }
  .btn-all.red { border-color: #f85149; color: #f85149; }
  .actions {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  #serverInput {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #e6edf3;
    padding: 8px 12px;
    font-size: 13px;
    width: 100%;
    margin-bottom: 10px;
  }
  .server-row { margin-bottom: 20px; }
  .server-label { font-size: 12px; color: #8b949e; margin-bottom: 6px; }
</style>
</head>
<body>

<h1>🎮 OBS Widget Panel</h1>
<p class="subtitle">Zarządzaj widocznością widgetów w OBS — zmiany działają natychmiast</p>

<div class="server-row">
  <div class="server-label">ADRES SERWERA GPS</div>
  <input id="serverInput" type="text" placeholder="Pobieranie z Gist..." readonly>
</div>

<div class="status-bar">
  <div class="dot" id="statusDot"></div>
  <span id="statusText">Łączenie z serwerem...</span>
</div>


<div class="tabs">
  <button class="tab active" onclick="switchTab('widgets')">🎛 Widgety</button>
  <button class="tab" onclick="switchTab('layout')">📐 Układ OBS</button>
</div>

<div id="sec-widgets" class="section active">
<div class="actions">
  <button class="btn-all green" onclick="setAll(true)">✅ Włącz wszystkie</button>
  <button class="btn-all red" onclick="setAll(false)">❌ Wyłącz wszystkie</button>
</div>

<div class="grid" id="grid">
</div><!-- end sec-widgets -->

<div id="sec-layout" class="section">
  <p style="font-size:13px;color:#8b949e;margin-bottom:14px">
    Przeciągaj widgety aby zmienić ich układ w OBS. Kliknij <b>Zastosuj</b> aby zapisać.
  </p>
  <div class="canvas-wrap">
    <div class="canvas-inner" id="layoutCanvas"></div>
  </div>
  <div class="layout-actions">
    <button class="btn-apply" onclick="applyLayout()">✅ Zastosuj układ</button>
    <button class="btn-reset" onclick="resetLayout()">↩ Resetuj</button>
    <span class="layout-info" id="layoutInfo"></span>
  </div>
</div>

</div>

<script>
const GIST_ID = 'b8194117c4bb29f977bec88ec9a5c592';
let SERVER = '';

const WIDGETS = [
  { key: 'speed',       name: 'Prędkość',    icon: '🚀' },
  { key: 'speedometer', name: 'Licznik',      icon: '🎯' },
  { key: 'battery',     name: 'Bateria',      icon: '🔋' },
  { key: 'weather',     name: 'Pogoda',       icon: '🌤' },
  { key: 'location',    name: 'Lokalizacja',  icon: '📍' },
  { key: 'map',         name: 'Mapa',         icon: '🗺' },
  { key: 'minimap',     name: 'Mini mapa',    icon: '🔎' },
  { key: 'tracker',     name: 'Tracker',      icon: '📈' },
  { key: 'elevation',   name: 'Wysokość',     icon: '⛰' },
  { key: 'compass',     name: 'Kompas',       icon: '🧭' },
  { key: 'gforce',      name: 'G-Force',      icon: '💥' },
  { key: 'heartrate',   name: 'Tętno',        icon: '❤️' },
];

let state = {};

// Pobierz SERVER URL z Gist
async function fetchServerUrl() {
  try {
    const r = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
      headers: { Accept: 'application/vnd.github.v3+json' }
    });
    const data = await r.json();
    const file = data.files['obs-gps-server-url.json'];
    if (file) {
      const parsed = JSON.parse(file.content);
      if (parsed.url) {
        SERVER = parsed.url;
        document.getElementById('serverInput').value = SERVER;
      }
    }
  } catch(e) {}
}

// Zbuduj karty
function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  WIDGETS.forEach(w => {
    const on = state[w.key] !== false;
    const card = document.createElement('div');
    card.className = 'card ' + (on ? 'active' : 'inactive');
    card.id = 'card-' + w.key;
    card.innerHTML = `
      <div class="card-top">
        <span class="icon">${w.icon}</span>
        <span class="name">${w.name}</span>
      </div>
      <div class="toggle-row">
        <span class="toggle-label">${on ? 'Widoczny' : 'Ukryty'}</span>
        <label class="toggle">
          <input type="checkbox" id="tog-${w.key}" ${on ? 'checked' : ''}
            onchange="toggle('${w.key}', this.checked)">
          <span class="slider"></span>
        </label>
      </div>`;
    grid.appendChild(card);
  });
}

// Wysylaj zmiane do serwera
async function toggle(key, value) {
  state[key] = value;
  updateCard(key, value);
  if (!SERVER) return;
  try {
    await fetch(SERVER + '/widgets', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ [key]: value })
    });
  } catch(e) {}
}

function updateCard(key, on) {
  const card = document.getElementById('card-' + key);
  if (!card) return;
  card.className = 'card ' + (on ? 'active' : 'inactive');
  card.querySelector('.toggle-label').textContent = on ? 'Widoczny' : 'Ukryty';
}

async function setAll(value) {
  const update = {};
  WIDGETS.forEach(w => { update[w.key] = value; state[w.key] = value; });
  WIDGETS.forEach(w => updateCard(w.key, value));
  WIDGETS.forEach(w => {
    const cb = document.getElementById('tog-' + w.key);
    if (cb) cb.checked = value;
  });
  if (!SERVER) return;
  try {
    await fetch(SERVER + '/widgets', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(update)
    });
  } catch(e) {}
}

// Polling - pobieraj stan z serwera co 3 sek
async function pollState() {
  if (!SERVER) return;
  try {
    const r = await fetch(SERVER + '/widgets', {cache: 'no-cache'});
    if (!r.ok) throw new Error();
    const newState = await r.json();
    const changed = JSON.stringify(newState) !== JSON.stringify(state);
    state = newState;
    if (changed) buildGrid();
    document.getElementById('statusDot').className = 'dot online';
    document.getElementById('statusText').textContent = 'Połączono z serwerem GPS';
  } catch {
    document.getElementById('statusDot').className = 'dot offline';
    document.getElementById('statusText').textContent = 'Brak połączenia z serwerem';
  }
}

// Init
(async function init() {
  await fetchServerUrl();
  await pollState();
  buildGrid();
  setInterval(pollState, 3000);
})();

// ── TABS ──
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['widgets','layout'][i] === name));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-' + name).classList.add('active');
  if (name === 'layout') {
    requestAnimationFrame(() => requestAnimationFrame(() => renderCanvas()));
  }
}

// ── LAYOUT ──
const CANVAS_W = 1920, CANVAS_H = 1080;

const DEFAULT_LAYOUT = {"w-speed": {"left": 20, "top": 20, "width": 200, "height": 110}, "w-battery": {"left": 230, "top": 20, "width": 200, "height": 110}, "w-weather": {"left": 440, "top": 20, "width": 220, "height": 120}, "w-location": {"left": 670, "top": 20, "width": 260, "height": 100}, "w-tracker": {"left": 20, "top": 150, "width": 380, "height": 110}, "w-heartrate": {"left": 1700, "top": 245, "width": 200, "height": 170}, "w-gforce": {"left": 1480, "top": 245, "width": 200, "height": 190}, "w-elevation": {"left": 20, "top": 910, "width": 500, "height": 160}, "w-compass": {"left": 1700, "top": 20, "width": 180, "height": 210}, "w-speedo": {"left": 1480, "top": 20, "width": 200, "height": 210}, "w-map": {"left": 1540, "top": 450, "width": 370, "height": 620}};

let currentLayout = JSON.parse(JSON.stringify(DEFAULT_LAYOUT));

const WIDGET_LABELS = {
  'w-speed':'🚀 Prędkość','w-battery':'🔋 Bateria','w-weather':'🌤 Pogoda',
  'w-location':'📍 Lokalizacja','w-tracker':'📈 Tracker','w-heartrate':'❤️ Tętno',
  'w-gforce':'💥 G-Force','w-elevation':'⛰ Wysokość','w-compass':'🧭 Kompas',
  'w-speedo':'🎯 Licznik','w-map':'🗺 Mapa'
};

function renderCanvas() {
  const canvas = document.getElementById('layoutCanvas');
  const rect = canvas.getBoundingClientRect();
  const scaleX = rect.width / CANVAS_W;
  const scaleY = rect.height / CANVAS_H;
  canvas.innerHTML = '';

  Object.entries(currentLayout).forEach(([id, pos]) => {
    const isHidden = state[id.replace('w-','')] === false ||
      (id === 'w-heartrate' && state['heartrate'] === false) ||
      (id === 'w-speedo' && state['speedometer'] === false);

    const el = document.createElement('div');
    el.className = 'w-proxy' + (isHidden ? ' hidden-w' : '');
    el.id = 'proxy-' + id;
    el.title = WIDGET_LABELS[id] || id;
    el.style.left   = (pos.left   * scaleX) + 'px';
    el.style.top    = (pos.top    * scaleY) + 'px';
    el.style.width  = (pos.width  * scaleX) + 'px';
    el.style.height = (pos.height * scaleY) + 'px';
    el.innerHTML = `<span style="padding:2px 4px;pointer-events:none">${WIDGET_LABELS[id]||id}</span>`;

    // Drag logic
    let startX, startY, startLeft, startTop;
    el.addEventListener('mousedown', e => {
      e.preventDefault();
      el.classList.add('dragging');
      startX = e.clientX; startY = e.clientY;
      startLeft = pos.left; startTop = pos.top;

      function onMove(e) {
        const dx = (e.clientX - startX) / scaleX;
        const dy = (e.clientY - startY) / scaleY;
        const newLeft = Math.max(0, Math.min(CANVAS_W - pos.width,  Math.round(startLeft + dx)));
        const newTop  = Math.max(0, Math.min(CANVAS_H - pos.height, Math.round(startTop  + dy)));
        currentLayout[id].left = newLeft;
        currentLayout[id].top  = newTop;
        el.style.left = (newLeft * scaleX) + 'px';
        el.style.top  = (newTop  * scaleY) + 'px';
        document.getElementById('layoutInfo').textContent = `${WIDGET_LABELS[id]}: ${newLeft}x${newTop}`;
      }
      function onUp() {
        el.classList.remove('dragging');
        window.removeEventListener('mousemove', onMove);
        window.removeEventListener('mouseup', onUp);
      }
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onUp);
    });

    // Touch support
    el.addEventListener('touchstart', e => {
      e.preventDefault();
      const t = e.touches[0];
      startX = t.clientX; startY = t.clientY;
      startLeft = pos.left; startTop = pos.top;
      el.classList.add('dragging');
    }, {passive:false});
    el.addEventListener('touchmove', e => {
      e.preventDefault();
      const t = e.touches[0];
      const dx = (t.clientX - startX) / scaleX;
      const dy = (t.clientY - startY) / scaleY;
      const newLeft = Math.max(0, Math.min(CANVAS_W - pos.width,  Math.round(startLeft + dx)));
      const newTop  = Math.max(0, Math.min(CANVAS_H - pos.height, Math.round(startTop  + dy)));
      currentLayout[id].left = newLeft;
      currentLayout[id].top  = newTop;
      el.style.left = (newLeft * scaleX) + 'px';
      el.style.top  = (newTop  * scaleY) + 'px';
    }, {passive:false});
    el.addEventListener('touchend', e => {
      el.classList.remove('dragging');
    });

    canvas.appendChild(el);
  });
}

async function applyLayout() {
  if (!SERVER) { alert('Brak połączenia z serwerem!'); return; }
  try {
    await fetch(SERVER + '/layout', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(currentLayout)
    });
    document.getElementById('layoutInfo').textContent = '✅ Układ zastosowany!';
    setTimeout(() => document.getElementById('layoutInfo').textContent = '', 3000);
  } catch {
    document.getElementById('layoutInfo').textContent = '❌ Błąd zapisu';
  }
}

function resetLayout() {
  currentLayout = JSON.parse(JSON.stringify(DEFAULT_LAYOUT));
  renderCanvas();
  document.getElementById('layoutInfo').textContent = 'Układ zresetowany — kliknij Zastosuj aby zapisać';
}

// Przerysuj canvas przy zmianie rozmiaru okna
window.addEventListener('resize', () => {
  if (document.getElementById('sec-layout').classList.contains('active')) renderCanvas();
});

</script>
</body>
</html>
