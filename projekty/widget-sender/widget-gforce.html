<!DOCTYPE html>
<html lang="pl"><head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:transparent;overflow:hidden;width:220px;height:200px;font-family:'JetBrains Mono',monospace;-webkit-font-smoothing:antialiased}
  .card{width:220px;height:200px;background:rgba(14,8,16,0.92);border:1.5px solid rgba(201,102,168,0.4);border-radius:16px;padding:14px 18px;display:flex;flex-direction:column;gap:8px;box-shadow:0 2px 20px rgba(0,0,0,0.6);position:relative;overflow:hidden}
  .card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#c966a8 0%,rgba(201,102,168,0.1) 70%,transparent 100%)}
  .top{display:flex;align-items:center;justify-content:space-between}
  .label{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#c966a8;opacity:.85}
  .total{font-size:24px;font-weight:800;color:#fff} 
  .total-unit{font-size:13px;color:rgba(255,255,255,0.35)}
  .chart-wrap{flex:1;position:relative;min-height:0}
  canvas{position:absolute;inset:0;width:100%;height:100%}
  .stats{display:flex;justify-content:space-between}
  .stat{display:flex;flex-direction:column;align-items:center;gap:2px}
  .sk{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.25)}
  .sv{font-size:15px;font-weight:700;color:#fff}
</style></head><body>
<div class="card">
  <div class="top">
    <div class="label">G-Force</div>
    <div style="display:flex;align-items:baseline;gap:5px">
      <div class="total" id="gTotal">0.00</div>
      <div class="total-unit">G</div>
    </div>
  </div>
  <div class="chart-wrap"><canvas id="cv"></canvas></div>
  <div class="stats">
    <div class="stat"><div class="sk">X (bok)</div><div class="sv" id="gx">0.00</div></div>
    <div class="stat"><div class="sk">Y (przód)</div><div class="sv" id="gy">0.00</div></div>
    <div class="stat"><div class="sk">Z (góra)</div><div class="sv" id="gz">0.00</div></div>
    <div class="stat"><div class="sk">Max G</div><div class="sv" id="gmax" style="color:#e84040">0.00</div></div>
  </div>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const HIST=[],MAX_H=80;let maxG=0;
function resize(){const p=cv.parentElement;cv.width=p.offsetWidth*devicePixelRatio;cv.height=p.offsetHeight*devicePixelRatio;ctx.scale(devicePixelRatio,devicePixelRatio);}
window.addEventListener('resize',resize);setTimeout(resize,50);
function draw(){const W=cv.width/devicePixelRatio,H=cv.height/devicePixelRatio;ctx.clearRect(0,0,W,H);if(HIST.length<2)return;const maxV=Math.max(2,...HIST)*1.1;const gr=ctx.createLinearGradient(0,0,0,H);gr.addColorStop(0,'rgba(201,102,168,0.5)');gr.addColorStop(1,'rgba(201,102,168,0.02)');const xOf=i=>i/(MAX_H-1)*W,yOf=v=>H-Math.min(v/maxV,1)*H*.88;ctx.beginPath();ctx.moveTo(xOf(0),H);HIST.forEach((v,i)=>ctx.lineTo(xOf(i),yOf(v)));ctx.lineTo(xOf(HIST.length-1),H);ctx.closePath();ctx.fillStyle=gr;ctx.fill();ctx.beginPath();HIST.forEach((v,i)=>i===0?ctx.moveTo(xOf(0),yOf(v)):ctx.lineTo(xOf(i),yOf(v)));ctx.strokeStyle='#c966a8';ctx.lineWidth=1.5;ctx.lineJoin='round';ctx.stroke();const y1g=yOf(1);ctx.beginPath();ctx.setLineDash([3,4]);ctx.moveTo(0,y1g);ctx.lineTo(W,y1g);ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1;ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='bold 9px monospace';ctx.textAlign='left';ctx.fillText('1G',2,y1g-3);}
function onMotion(e){const a=e.accelerationIncludingGravity||{x:0,y:0,z:0};const ax=(a.x||0)/9.81,ay=(a.y||0)/9.81,az=((a.z||0)-9.81)/9.81;const tot=Math.sqrt(ax*ax+ay*ay+az*az);if(tot>maxG)maxG=tot;HIST.push(tot);if(HIST.length>MAX_H)HIST.shift();const el=document.getElementById('gTotal');el.textContent=tot.toFixed(2);el.style.color=tot>1.5?'#e84040':tot>0.8?'#f0a040':'#fff';document.getElementById('gx').textContent=ax.toFixed(2);document.getElementById('gy').textContent=ay.toFixed(2);document.getElementById('gz').textContent=az.toFixed(2);document.getElementById('gmax').textContent=maxG.toFixed(2);draw();}
async function initMotion(){if(!('DeviceMotionEvent' in window))return;if(typeof DeviceMotionEvent.requestPermission==='function'){try{await DeviceMotionEvent.requestPermission();}catch{return;}}window.addEventListener('devicemotion',onMotion);}
initMotion();
</script></body></html>
