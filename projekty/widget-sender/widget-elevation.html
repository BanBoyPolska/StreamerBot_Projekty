<!DOCTYPE html>
<html lang="pl"><head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:transparent;overflow:hidden;width:400px;height:180px;-webkit-font-smoothing:antialiased}
  body{font-family:'JetBrains Mono',monospace}
  .card{width:400px;height:180px;background:rgba(8,12,18,0.92);border:1.5px solid rgba(90,140,220,0.4);border-radius:16px;padding:14px 18px 10px;display:flex;flex-direction:column;gap:8px;box-shadow:0 2px 20px rgba(0,0,0,0.6);position:relative;overflow:hidden}
  .card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#5a8cdc 0%,rgba(90,140,220,0.1) 70%,transparent 100%)}
  .top{display:flex;justify-content:space-between;align-items:center}
  .label{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#5a8cdc;opacity:.85}
  .stats{display:flex;gap:20px}
  .stat{display:flex;flex-direction:column;gap:2px;align-items:flex-start}
  .sk{font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:rgba(255,255,255,.28)}
  .sv{font-size:17px;font-weight:800;color:#fff}
  .chart-wrap{flex:1;position:relative;min-height:0}
  canvas{position:absolute;inset:0;width:100%;height:100%}
</style></head><body>
<div class="card">
  <div class="top">
    <div class="label">📈 Profil wysokości</div>
    <div class="stats">
      <div class="stat"><div class="sk">Teraz</div><div class="sv" id="sCur" style="color:#fff">-- m</div></div>
      <div class="stat"><div class="sk">Max</div><div class="sv" id="sMax" style="color:#5fa84d">-- m</div></div>
      <div class="stat"><div class="sk">Min</div><div class="sv" id="sMin" style="color:#c966a8">-- m</div></div>
      <div class="stat"><div class="sk">Przewyższenie</div><div class="sv" id="sGain" style="color:#f0a040">+0 m</div></div>
    </div>
  </div>
  <div class="chart-wrap"><canvas id="cv"></canvas></div>
</div>
<script>
const SERVER='https://gps.banboypolska.deno.net';
const MAX_PTS=300, pts=[];
let totalGain=0, lastAlt=null;
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
function resize(){const p=cv.parentElement;cv.width=p.offsetWidth*devicePixelRatio;cv.height=p.offsetHeight*devicePixelRatio;ctx.scale(devicePixelRatio,devicePixelRatio);draw();}
window.addEventListener('resize',resize);setTimeout(resize,100);
function fmtTime(iso){return new Date(iso).toLocaleTimeString('pl',{hour:'2-digit',minute:'2-digit',hour12:false});}
function draw(){
  const W=cv.width/devicePixelRatio,H=cv.height/devicePixelRatio;
  ctx.clearRect(0,0,W,H);
  if(pts.length<2){ctx.fillStyle='rgba(255,255,255,0.15)';ctx.font='12px JetBrains Mono,monospace';ctx.textAlign='center';ctx.fillText('oczekiwanie na dane GPS…',W/2,H/2);return;}
  const alts=pts.map(p=>p.alt),minA=Math.min(...alts),maxA=Math.max(...alts),range=maxA-minA||1;
  const PL=2,PR=40,PT=6,PB=18,cW=W-PL-PR,cH=H-PT-PB;
  const xOf=i=>PL+(i/(pts.length-1))*cW, yOf=a=>PT+cH-((a-minA)/range)*cH;
  const grad=ctx.createLinearGradient(0,PT,0,PT+cH);
  grad.addColorStop(0,'rgba(90,140,220,0.5)');grad.addColorStop(1,'rgba(90,140,220,0.02)');
  ctx.beginPath();ctx.moveTo(xOf(0),PT+cH);
  pts.forEach((p,i)=>ctx.lineTo(xOf(i),yOf(p.alt)));
  ctx.lineTo(xOf(pts.length-1),PT+cH);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
  ctx.beginPath();pts.forEach((p,i)=>i===0?ctx.moveTo(xOf(0),yOf(p.alt)):ctx.lineTo(xOf(i),yOf(p.alt)));
  ctx.strokeStyle='#5a8cdc';ctx.lineWidth=2;ctx.lineJoin='round';ctx.stroke();
  // Aktualny punkt
  const lx=xOf(pts.length-1),ly=yOf(pts[pts.length-1].alt);
  ctx.beginPath();ctx.arc(lx,ly,4,0,Math.PI*2);ctx.fillStyle='#5a8cdc';ctx.fill();
  ctx.beginPath();ctx.arc(lx,ly,8,0,Math.PI*2);ctx.strokeStyle='rgba(90,140,220,0.3)';ctx.lineWidth=1.5;ctx.stroke();
  // Skala Y
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='bold 10px JetBrains Mono,monospace';ctx.textAlign='left';
  [[maxA,PT+10],[minA,PT+cH]].forEach(([a,y])=>ctx.fillText(Math.round(a)+'m',W-PR+4,y));
  // Czas
  ctx.fillStyle='rgba(255,255,255,0.25)';ctx.font='9px JetBrains Mono,monospace';
  ctx.textAlign='left';ctx.fillText(fmtTime(pts[0].t),PL,H-4);
  ctx.textAlign='right';ctx.fillText(fmtTime(pts[pts.length-1].t),PL+cW,H-4);
}
async function poll(){
  try{
    const d=await(await fetch(SERVER+'/data',{cache:'no-cache'})).json();
    if(d.alt==null) return;
    const alt=Math.round(d.alt*10)/10;
    if(lastAlt!==null&&alt>lastAlt) totalGain+=alt-lastAlt;
    lastAlt=alt;
    if(pts.length===0||Math.abs(alt-pts[pts.length-1].alt)>=0.5){
      pts.push({alt,t:d.lastUpdate||new Date().toISOString()});
      if(pts.length>MAX_PTS) pts.shift();
    }
    const alts=pts.map(p=>p.alt);
    document.getElementById('sCur').textContent=alt+' m';
    document.getElementById('sMax').textContent=Math.max(...alts)+' m';
    document.getElementById('sMin').textContent=Math.min(...alts)+' m';
    document.getElementById('sGain').textContent='+'+Math.round(totalGain)+' m';
    draw();
  }catch{}
}
poll();setInterval(poll,3000);
</script></body></html>
