<!DOCTYPE html>
<html lang="pl"><head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:transparent;overflow:hidden;width:400px;height:120px;-webkit-font-smoothing:antialiased}
  body{font-family:'JetBrains Mono',monospace}
  .card{width:400px;height:120px;background:rgba(14,9,14,0.92);border:1.5px solid rgba(201,102,168,0.4);border-radius:16px;padding:14px 20px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 2px 20px rgba(0,0,0,0.6);position:relative;overflow:hidden}
  .card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#c966a8 0%,rgba(201,102,168,0.1) 70%,transparent 100%)}
  .top{display:flex;align-items:center;justify-content:space-between}
  .label{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#c966a8;opacity:.85}
  .badge{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;border:1px solid transparent}
  .idle{background:rgba(255,255,255,.04);color:rgba(255,255,255,.4);border-color:rgba(255,255,255,.1)}
  .running{background:rgba(95,168,77,.12);color:#5fa84d;border-color:rgba(95,168,77,.35);animation:blink 1.8s ease-in-out infinite}
  .paused{background:rgba(200,162,48,.12);color:#c8a230;border-color:rgba(200,162,48,.35)}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
  .stats{display:flex;gap:0;flex:1;align-items:flex-end}
  .stat{flex:1;display:flex;flex-direction:column;gap:3px;padding-right:8px}
  .stat:not(:last-child){border-right:1px solid rgba(255,255,255,.07);margin-right:8px}
  .sk{font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.07em}
  .sv{font-size:28px;font-weight:800;color:#fff;letter-spacing:-1px;line-height:1}
  .su{font-size:10px;color:rgba(255,255,255,.3)}
</style></head><body>
<div class="card">
  <div class="top">
    <div class="label">Tracker trasy</div>
    <div class="badge idle" id="badge">⬛ IDLE</div>
  </div>
  <div class="stats">
    <div class="stat">
      <div class="sk">Dystans</div>
      <div class="sv" id="dist">0.00</div>
      <div class="su">km</div>
    </div>
    <div class="stat">
      <div class="sk">Czas</div>
      <div class="sv" id="time" style="font-size:24px">00:00</div>
      <div class="su">hh:mm</div>
    </div>
    <div class="stat">
      <div class="sk">Śr. prędkość</div>
      <div class="sv" id="avg">0.0</div>
      <div class="su">km/h</div>
    </div>
  </div>
</div>
<script>
const SERVER='https://gps.banboypolska.deno.net';
async function poll(){
  try{
    const d=await(await fetch(SERVER+'/data',{cache:'no-cache'})).json();
    const b=document.getElementById('badge');
    if(d.trackerState==='running'){b.className='badge running';b.textContent='▶ LIVE';}
    else if(d.trackerState==='paused'){b.className='badge paused';b.textContent='⏸ PAUZA';}
    else{b.className='badge idle';b.textContent='⬛ IDLE';}
    document.getElementById('dist').textContent=(d.trackerDist??0).toFixed(2);
    // Pokaż tylko hh:mm (utnij sekundy jeśli format hh:mm:ss)
    const t=(d.trackerTime||'00:00').split(':').slice(0,2).join(':');
    document.getElementById('time').textContent=t;
    document.getElementById('avg').textContent=(d.trackerAvgSpeed??0).toFixed(1);
  }catch{}
}
poll();setInterval(poll,3000);
</script></body></html>
