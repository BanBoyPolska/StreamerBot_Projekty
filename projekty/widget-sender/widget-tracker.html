<!DOCTYPE html>
<html lang="pl"><head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:transparent;overflow:hidden;width:340px;height:110px;font-family:'JetBrains Mono',monospace;-webkit-font-smoothing:antialiased}
  .card{width:340px;height:110px;background:linear-gradient(135deg,rgba(10,15,18,0.88) 0%,rgba(14,20,24,0.82) 100%);border:1px solid rgba(201,102,168,0.25);border-radius:14px;padding:12px 16px;display:flex;flex-direction:column;justify-content:space-between;backdrop-filter:blur(12px);box-shadow:0 4px 24px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.04);position:relative;overflow:hidden}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#c966a8,transparent)}
  .top{display:flex;align-items:center;justify-content:space-between}
  .label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(201,102,168,0.7)}
  .badge{padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;border:1px solid transparent}
  .badge-idle{background:rgba(255,255,255,.03);color:rgba(255,255,255,.3);border-color:rgba(255,255,255,.08)}
  .badge-running{background:rgba(95,168,77,.1);color:#5fa84d;border-color:rgba(95,168,77,.3);animation:blink 1.8s ease-in-out infinite}
  .badge-paused{background:rgba(200,162,48,.1);color:#c8a230;border-color:rgba(200,162,48,.3)}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
  .stats{display:flex;gap:24px}
  .stat{display:flex;flex-direction:column;gap:1px}
  .stat-lbl{font-size:9px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.07em}
  .stat-val{font-size:22px;font-weight:800;color:#fff;letter-spacing:-1px;line-height:1}
  .stat-unit{font-size:9px;color:rgba(255,255,255,.25)}
</style></head><body>
<div class="card">
  <div class="top">
    <div class="label">Tracker trasy</div>
    <div class="badge badge-idle" id="badge">⬛ IDLE</div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-lbl">Dystans</div><div class="stat-val" id="dist">0.00</div><div class="stat-unit">km</div></div>
    <div class="stat"><div class="stat-lbl">Czas</div><div class="stat-val" id="time" style="font-size:18px">00:00:00</div><div class="stat-unit">hh:mm</div></div>
    <div class="stat"><div class="stat-lbl">Śr. prędkość</div><div class="stat-val" id="avg">0.0</div><div class="stat-unit">km/h</div></div>
  </div>
</div>
<script>
const SERVER = 'https://gps.banboypolska.deno.net';

async function poll(){
  try{
    const d=await(await fetch(SERVER+'/data',{cache:'no-cache'})).json();
    const b=document.getElementById('badge');
    if(d.trackerState==='running'){b.className='badge badge-running';b.textContent='▶ LIVE';}
    else if(d.trackerState==='paused'){b.className='badge badge-paused';b.textContent='⏸ PAUZA';}
    else{b.className='badge badge-idle';b.textContent='⬛ IDLE';}
    document.getElementById('dist').textContent=(d.trackerDist??0).toFixed(2);
    document.getElementById('time').textContent=d.trackerTime||'00:00:00';
    document.getElementById('avg').textContent=(d.trackerAvgSpeed??0).toFixed(1);
  }catch{}
}
poll(); setInterval(poll,3000);
</script>
</body></html>
