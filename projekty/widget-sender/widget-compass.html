<!DOCTYPE html>
<html lang="pl"><head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:transparent;overflow:hidden;width:180px;height:215px;font-family:'JetBrains Mono',monospace;-webkit-font-smoothing:antialiased;border-radius:16px}
  .wrap{display:flex;flex-direction:column;align-items:center;gap:6px;padding-top:4px}
  canvas{filter:drop-shadow(0 4px 12px rgba(0,0,0,0.4))}
  .bottom{background:rgba(8,12,16,0.88);border:1.5px solid rgba(79,152,163,0.35);border-radius:10px;width:160px;padding:6px 0;display:flex;justify-content:center;gap:20px}
  .info{display:flex;flex-direction:column;align-items:center;gap:1px}
  .ik{font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:rgba(255,255,255,.28)}
  .iv{font-size:18px;font-weight:800;color:#fff}
</style></head><body>
<div class="wrap">
  <canvas id="cv" width="165" height="165"></canvas>
  <div class="bottom">
    <div class="info"><div class="ik">Kierunek</div><div class="iv" id="degVal">--°</div></div>
    <div class="info"><div class="ik">Strona</div><div class="iv" id="dirVal" style="color:#4f98a3">--</div></div>
  </div>
</div>
<script>
let SERVER='https://gps.banboypolska.deno.net';

// ── AUTO-FETCH SERVER URL z GitHub Gist ──
const _GIST_ID = 'b8194117c4bb29f977bec88ec9a5c592';
async function _initServerUrl() {
  try {
    const r = await fetch(`https://api.github.com/gists/${_GIST_ID}`, {
      headers: { 'Accept': 'application/vnd.github.v3+json' }
    });
    const data = await r.json();
    const file = data.files['obs-gps-server-url.json'];
    if (file) {
      const parsed = JSON.parse(file.content);
      if (parsed.url) { SERVER = parsed.url; }
    }
  } catch(e) {}
}

const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const W=165,CX=82,CY=82,R=77;
let heading=0;
const DNAMES=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
function dirName(h){return DNAMES[Math.round(h/22.5)%16];}
function draw(){
  ctx.clearRect(0,0,W,W);
  // Tło
  ctx.beginPath();ctx.arc(CX,CY,R,0,Math.PI*2);
  const bg=ctx.createRadialGradient(CX,CY,0,CX,CY,R);
  bg.addColorStop(0,'rgba(15,22,30,0.95)');bg.addColorStop(1,'rgba(8,12,16,0.95)');
  ctx.fillStyle=bg;ctx.fill();
  ctx.beginPath();ctx.arc(CX,CY,R,0,Math.PI*2);ctx.strokeStyle='rgba(79,152,163,0.3)';ctx.lineWidth=1.5;ctx.stroke();
  ctx.save();ctx.translate(CX,CY);ctx.rotate((heading-90)*Math.PI/180);
  // Znaczniki
  for(let i=0;i<36;i++){
    const a=i*10*Math.PI/180,major=i%9===0,minor4=i%3===0;
    const r1=R-3,r2=major?R-20:minor4?R-12:R-7;
    ctx.beginPath();ctx.moveTo(Math.cos(a)*r1,Math.sin(a)*r1);ctx.lineTo(Math.cos(a)*r2,Math.sin(a)*r2);
    ctx.strokeStyle=major?'rgba(255,255,255,0.9)':minor4?'rgba(255,255,255,0.4)':'rgba(255,255,255,0.15)';
    ctx.lineWidth=major?2:0.8;ctx.stroke();
  }
  // Etykiety
  ctx.font='bold 13px JetBrains Mono,monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  [['N',0,'#e85555'],['E',90,'rgba(255,255,255,0.85)'],['S',180,'rgba(255,255,255,0.85)'],['W',270,'rgba(255,255,255,0.85)']].forEach(([l,a,c])=>{
    const rad=a*Math.PI/180;ctx.fillStyle=c;ctx.fillText(l,Math.cos(rad)*(R-26),Math.sin(rad)*(R-26));
  });
  ctx.restore();
  // Igła
  ctx.save();ctx.translate(CX,CY);
  ctx.beginPath();ctx.moveTo(0,-R+18);ctx.lineTo(6,4);ctx.lineTo(0,10);ctx.lineTo(-6,4);ctx.closePath();
  ctx.fillStyle='#e85555';ctx.shadowColor='#e85555';ctx.shadowBlur=8;ctx.fill();
  ctx.beginPath();ctx.moveTo(0,R-18);ctx.lineTo(6,4);ctx.lineTo(0,-10);ctx.lineTo(-6,4);ctx.closePath();
  ctx.fillStyle='rgba(255,255,255,0.25)';ctx.shadowBlur=0;ctx.fill();
  ctx.beginPath();ctx.arc(0,0,6,0,Math.PI*2);ctx.fillStyle='#0d1420';ctx.fill();
  ctx.beginPath();ctx.arc(0,0,3.5,0,Math.PI*2);ctx.fillStyle='#4f98a3';ctx.fill();
  ctx.restore();
}
let af;
function animateTo(t){cancelAnimationFrame(af);function step(){let d=t-heading;while(d>180)d-=360;while(d<-180)d+=360;heading+=d*0.15;draw();if(Math.abs(d)>0.3)af=requestAnimationFrame(step);else{heading=t;draw();}}step();}
async function poll(){try{const d=await(await fetch(SERVER+'/data',{cache:'no-cache'})).json();const h=d.heading??null;if(h!==null){animateTo(h);document.getElementById('degVal').textContent=Math.round(h)+'°';document.getElementById('dirVal').textContent=dirName(h);}}catch{}}
draw();_initServerUrl().then(() => { poll();setInterval(poll,3000); });

// ── WIDGET VISIBILITY (panel moderacji) ──
(function initVisibility() {
  const WIDGET_KEY = 'compass';
  let _visServer = '';

  async function checkVisibility() {
    if (!_visServer) return;
    try {
      const r = await fetch(_visServer + '/widgets', {cache: 'no-cache'});
      const state = await r.json();
      const visible = state[WIDGET_KEY] !== false;
      document.body.style.opacity = visible ? '1' : '0';
      document.body.style.pointerEvents = visible ? '' : 'none';
    } catch {}
  }

  // Czekaj az SERVER bedzie znany (ustawiony przez _initServerUrl)
  function waitForServer() {
    if (typeof SERVER !== 'undefined' && SERVER && !SERVER.includes('deno.net')) {
      _visServer = SERVER;
      checkVisibility();
      setInterval(checkVisibility, 2000);
    } else {
      setTimeout(waitForServer, 500);
    }
  }
  waitForServer();
})();
</script></body></html>
