<!DOCTYPE html>
<html lang="pl"><head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:transparent;overflow:hidden;width:240px;height:120px;-webkit-font-smoothing:antialiased;border-radius:16px}
  body{font-family:'JetBrains Mono',monospace}
  .card{
    width:240px;height:120px;
    background:rgba(10,16,12,0.92);
    border:1.5px solid rgba(95,168,77,0.4);
    border-radius:16px;padding:14px 20px;
    display:flex;flex-direction:column;justify-content:space-between;
    box-shadow:0 2px 20px rgba(0,0,0,0.6),inset 0 1px 0 rgba(95,168,77,0.08);
    position:relative;overflow:hidden;
  }
  .card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg,#5fa84d 0%,rgba(95,168,77,0.1) 70%,transparent 100%)}
  .top{display:flex;align-items:center;justify-content:space-between}
  .label{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#5fa84d;opacity:.85}
  .dot{width:7px;height:7px;border-radius:50%;background:#3d4147}
  .dot.live{background:#5fa84d;box-shadow:0 0 8px #5fa84d;animation:blink 1.8s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
  .val-row{display:flex;align-items:baseline;gap:10px}
  .val{font-size:64px;font-weight:800;line-height:1;color:#fff;letter-spacing:-3px}
  .unit{font-size:18px;font-weight:700;color:rgba(255,255,255,0.45)}
  .sub{font-size:11px;color:rgba(255,255,255,0.3)}
</style></head><body>
<div class="card">
  <div class="top">
    <div class="label">Prędkość</div>
    <div class="dot" id="dot"></div>
  </div>
  <div class="val-row">
    <div class="val" id="val">--</div>
    <div class="unit">km/h</div>
  </div>
  <div class="sub" id="sub">oczekiwanie na GPS…</div>
</div>
<script>
let SERVER='https://gps.banboypolska.deno.net';

// ── AUTO-FETCH SERVER URL z GitHub Gist ──
const _GIST_ID = 'b8194117c4bb29f977bec88ec9a5c592';
async function _initServerUrl() {
  try {
    const r = await fetch(`https://api.github.com/gists/${_GIST_ID}`, {
      headers: { 'Accept': 'application/vnd.github.v3+json' }
    });
    const data = await r.json();
    const file = data.files['obs-gps-server-url.json'];
    if (file) {
      const parsed = JSON.parse(file.content);
      if (parsed.url) { SERVER = parsed.url; }
    }
  } catch(e) {}
}

async function poll(){
  try{
    const d=await(await fetch(SERVER+'/data',{cache:'no-cache'})).json();
    document.getElementById('val').textContent=d.speed??'--';
    const ago=d.lastUpdate?Math.round((Date.now()-new Date(d.lastUpdate).getTime())/1000):null;
    const live=ago!==null&&ago<15;
    document.getElementById('dot').className='dot'+(live?' live':'');
    document.getElementById('sub').textContent=live?`GPS ±${d.accuracy??'?'}m · ${ago}s temu`:'brak sygnału';
  }catch{document.getElementById('dot').className='dot';}
}
_initServerUrl().then(() => { poll();setInterval(poll,3000); });

// ── WIDGET VISIBILITY (panel moderacji) ──
(function initVisibility() {
  const WIDGET_KEY = 'speed';
  let _visServer = '';

  async function checkVisibility() {
    if (!_visServer) return;
    try {
      const r = await fetch(_visServer + '/widgets', {cache: 'no-cache'});
      const state = await r.json();
      const visible = state[WIDGET_KEY] !== false;
      document.body.style.opacity = visible ? '1' : '0';
      document.body.style.pointerEvents = visible ? '' : 'none';
    } catch {}
  }

  // Czekaj az SERVER bedzie znany (ustawiony przez _initServerUrl)
  let _waitTries = 0;
  function waitForServer() {
    _waitTries++;
    const s = (typeof SERVER !== 'undefined') ? SERVER : '';
    const ready = s && !s.includes('deno.net') && !s.includes('pobieram');
    if (ready) {
      _visServer = s;
      checkVisibility();
      setInterval(checkVisibility, 2000);
    } else if (_waitTries > 8) {
      // Fallback: uzyj localhost jesli Gist nie odpowiedzial
      _visServer = 'http://localhost:1985';
      checkVisibility();
      setInterval(checkVisibility, 2000);
    } else {
      setTimeout(waitForServer, 500);
    }
  }
  waitForServer();
})();
</script></body></html>
