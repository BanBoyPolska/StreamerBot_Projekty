<!DOCTYPE html>
<html lang="pl"><head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:transparent;overflow:hidden;width:220px;height:230px;font-family:'JetBrains Mono',monospace;-webkit-font-smoothing:antialiased;border-radius:16px}
  .wrap{display:flex;flex-direction:column;align-items:center;gap:5px;padding-top:4px}
  .center{position:absolute;top:50%;left:50%;transform:translate(-50%,-44%);z-index:2;text-align:center;pointer-events:none}
  .val{font-size:44px;font-weight:800;color:#fff;letter-spacing:-2px;line-height:1}
  .unit{font-size:12px;font-weight:700;color:rgba(255,255,255,0.4)}
  .canvas-wrap{position:relative;width:210px;height:210px}
  canvas{position:absolute;inset:0}
  .bottom{background:rgba(8,12,16,0.88);border:1.5px solid rgba(95,168,77,0.3);border-radius:10px;width:190px;padding:6px 12px;display:flex;justify-content:space-between}
  .info{display:flex;flex-direction:column;align-items:center;gap:1px}
  .ik{font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:rgba(255,255,255,.28)}
  .iv{font-size:15px;font-weight:800;color:#fff}
</style></head><body>
<div class="wrap">
  <div class="canvas-wrap">
    <canvas id="cv" width="210" height="210"></canvas>
    <div class="center">
      <div class="val" id="val">0</div>
      <div class="unit">km/h</div>
    </div>
  </div>
  <div class="bottom">
    <div class="info"><div class="ik">Max</div><div class="iv" id="maxV" style="color:#e87038">--</div></div>
    <div class="info"><div class="ik">Śr.</div><div class="iv" id="avgV">--</div></div>
  </div>
</div>
<script>
let SERVER='https://gps.banboypolska.deno.net';

// ── AUTO-FETCH SERVER URL z GitHub Gist ──
const _GIST_ID = 'b8194117c4bb29f977bec88ec9a5c592';
async function _initServerUrl() {
  try {
    const r = await fetch(`https://api.github.com/gists/${_GIST_ID}`, {
      headers: { 'Accept': 'application/vnd.github.v3+json' }
    });
    const data = await r.json();
    const file = data.files['obs-gps-server-url.json'];
    if (file) {
      const parsed = JSON.parse(file.content);
      if (parsed.url) { SERVER = parsed.url; }
    }
  } catch(e) {}
}

const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const W=210,CX=105,CY=108,R=90,MAX_SPD=160;
const START=Math.PI*0.75,END=Math.PI*2.25,SWEEP=END-START;
let curS=0,maxS=0,sumS=0,cntS=0;
function draw(s){
  ctx.clearRect(0,0,W,W);
  const pct=Math.min(s/MAX_SPD,1);
  // Tło tarczy
  ctx.beginPath();ctx.arc(CX,CY,R,0,Math.PI*2);
  const bg=ctx.createRadialGradient(CX,CY,0,CX,CY,R);
  bg.addColorStop(0,'rgba(14,20,12,0.95)');bg.addColorStop(1,'rgba(8,12,8,0.95)');
  ctx.fillStyle=bg;ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=1;ctx.stroke();
  // Szary łuk tła
  ctx.beginPath();ctx.arc(CX,CY,R-10,START,END);ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.lineWidth=16;ctx.lineCap='round';ctx.stroke();
  // Kolorowy łuk
  if(pct>0.005){
    const gr=ctx.createLinearGradient(CX-R,CY,CX+R,CY);
    gr.addColorStop(0,'#5fa84d');gr.addColorStop(0.5,'#f0a040');gr.addColorStop(1,'#e84040');
    ctx.beginPath();ctx.arc(CX,CY,R-10,START,START+SWEEP*pct);
    ctx.strokeStyle=gr;ctx.lineWidth=16;ctx.lineCap='round';ctx.stroke();
  }
  // Znaczniki + etykiety
  for(let i=0;i<=16;i++){
    const a=START+SWEEP*(i/16),major=i%4===0;
    ctx.beginPath();ctx.moveTo(CX+Math.cos(a)*(R-28),CY+Math.sin(a)*(R-28));ctx.lineTo(CX+Math.cos(a)*(R-major?40:33),CY+Math.sin(a)*(R-major?40:33));
    ctx.strokeStyle=major?'rgba(255,255,255,0.7)':'rgba(255,255,255,0.25)';ctx.lineWidth=major?1.5:0.8;ctx.stroke();
    if(major){ctx.font='bold 10px JetBrains Mono,monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fillText(Math.round(MAX_SPD*(i/16)),CX+Math.cos(a)*(R-52),CY+Math.sin(a)*(R-52));}
  }
  // Wskazówka
  const na=START+SWEEP*pct, nc=pct<0.5?'#5fa84d':pct<0.8?'#f0a040':'#e84040';
  ctx.save();ctx.translate(CX,CY);ctx.rotate(na);
  ctx.beginPath();ctx.moveTo(0,-R+24);ctx.lineTo(3.5,12);ctx.lineTo(-3.5,12);ctx.closePath();
  ctx.fillStyle=nc;ctx.shadowColor=nc;ctx.shadowBlur=10;ctx.fill();ctx.restore();
  // Środek
  ctx.beginPath();ctx.arc(CX,CY,8,0,Math.PI*2);ctx.fillStyle='#0a1008';ctx.shadowBlur=0;ctx.fill();
  ctx.beginPath();ctx.arc(CX,CY,4.5,0,Math.PI*2);ctx.fillStyle=nc;ctx.fill();
}
let af;
function animateTo(t){cancelAnimationFrame(af);function step(){curS+=(t-curS)*0.15;draw(curS);document.getElementById('val').textContent=Math.round(curS);if(Math.abs(curS-t)>0.3)af=requestAnimationFrame(step);else{curS=t;draw(t);document.getElementById('val').textContent=Math.round(t);}}step();}
async function poll(){try{const d=await(await fetch(SERVER+'/data',{cache:'no-cache'})).json();const s=d.speed??0;if(s>maxS){maxS=s;document.getElementById('maxV').textContent=s;}sumS+=s;cntS++;document.getElementById('avgV').textContent=(sumS/cntS).toFixed(1);animateTo(s);}catch{}}
draw(0);_initServerUrl().then(() => { poll();setInterval(poll,3000); });

// ── WIDGET VISIBILITY (panel moderacji) ──
(function initVisibility() {
  const WIDGET_KEY = 'speedometer';
  let _visServer = '';

  async function checkVisibility() {
    if (!_visServer) return;
    try {
      const r = await fetch(_visServer + '/widgets', {cache: 'no-cache'});
      const state = await r.json();
      const visible = state[WIDGET_KEY] !== false;
      document.body.style.opacity = visible ? '1' : '0';
      document.body.style.pointerEvents = visible ? '' : 'none';
    } catch {}
  }

  // Czekaj az SERVER bedzie znany (ustawiony przez _initServerUrl)
  let _waitTries = 0;
  function waitForServer() {
    _waitTries++;
    const s = (typeof SERVER !== 'undefined') ? SERVER : '';
    const ready = s && !s.includes('deno.net') && !s.includes('pobieram');
    if (ready) {
      _visServer = s;
      checkVisibility();
      setInterval(checkVisibility, 2000);
    } else if (_waitTries > 8) {
      // Fallback: uzyj localhost jesli Gist nie odpowiedzial
      _visServer = 'http://localhost:1985';
      checkVisibility();
      setInterval(checkVisibility, 2000);
    } else {
      setTimeout(waitForServer, 500);
    }
  }
  waitForServer();
})();
</script></body></html>
