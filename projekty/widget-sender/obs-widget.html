<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OBS GPS Widget</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-body: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --bg:        #0d0f12;
      --surface:   #131619;
      --border:    rgba(255,255,255,0.07);
      --text:      #e8eaed;
      --muted:     #6c7280;
      --faint:     #2d3037;
      --primary:   #4f98a3;
      --success:   #5fa84d;
      --warning:   #c8a230;
      --error:     #b84040;
      --pink:      #c966a8;
      --radius:    10px;
      --tr:        220ms cubic-bezier(0.16,1,0.3,1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 420px; overflow: hidden; -webkit-font-smoothing: antialiased; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 13px; display: flex; flex-direction: column; }

    /* Header */
    .header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px 8px; border-bottom: 1px solid var(--border); }
    .logo { display: flex; align-items: center; gap: 8px; color: var(--primary); }
    .logo-text { font-family: var(--font-mono); font-size: 11px; font-weight: 700; letter-spacing:.07em; text-transform: uppercase; color: var(--text); }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--faint); flex-shrink: 0; }
    .status-dot.live  { background: var(--success); box-shadow: 0 0 8px var(--success); animation: blink 1.8s ease-in-out infinite; }
    .status-dot.stale { background: var(--warning); }
    .status-dot.err   { background: var(--error); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }
    .clock { font-family: var(--font-mono); font-size: 12px; color: var(--muted); }
    .device-label { font-family: var(--font-mono); font-size: 10px; color: var(--primary); }
    .btn-cfg { font-size: 9px; font-family: var(--font-mono); color: var(--faint); background: none; border: 1px solid var(--faint); border-radius: 4px; padding: 2px 6px; cursor: pointer; transition: color var(--tr); }
    .btn-cfg:hover { color: var(--muted); }

    /* Grid */
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px 12px 10px; }

    /* Tile */
    .tile { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 11px 13px; position: relative; overflow: hidden; }
    .tile::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--accent, var(--primary)), transparent); }
    .tile-label { font-size: 9px; font-family: var(--font-mono); font-weight: 600; text-transform: uppercase; letter-spacing:.09em; color: var(--muted); display: flex; align-items: center; gap: 5px; margin-bottom: 6px; }
    .tile-val  { font-family: var(--font-mono); font-size: 26px; font-weight: 700; line-height: 1; color: var(--text); }
    .tile-unit { font-size: 10px; color: var(--muted); margin-top: 3px; font-family: var(--font-mono); }
    .tile-sub  { font-size: 10px; color: var(--muted); margin-top: 2px; }
    .tile-full { grid-column: 1 / -1; }

    .tile-spd  { --accent: var(--success); }
    .tile-bat  { --accent: #f0a040; }
    .tile-temp { --accent: #e87038; }
    .tile-acc  { --accent: var(--pink); }
    .tile-city { --accent: var(--primary); }
    .tile-map  { --accent: var(--primary); }

    /* Bat bar */
    .bat-bar  { height: 3px; background: rgba(255,255,255,.05); border-radius: 2px; margin-top: 7px; overflow: hidden; }
    .bat-fill { height: 100%; border-radius: 2px; background: var(--success); transition: width .8s ease; }

    /* Mapa */
    .map-wrap { width: 100%; height: 200px; border-radius: calc(var(--radius) - 3px); overflow: hidden; margin-top: 8px; position: relative; border: 1px solid var(--border); }
    #map { width: 100%; height: 100%; }
    .leaflet-tile { filter: brightness(.8) saturate(.6) hue-rotate(185deg); }
    .leaflet-container { background: #0a0c0f; }
    .leaflet-control-zoom a { background: #1a1e22 !important; color: var(--text) !important; border-color: var(--border) !important; }
    .leaflet-control-attribution { background: rgba(10,12,15,.8) !important; color: var(--muted) !important; font-size: 8px !important; }
    .leaflet-control-attribution a { color: var(--primary) !important; }
    .gps-pulse-outer { width: 18px; height: 18px; border-radius: 50%; background: rgba(79,152,163,.2); border: 2px solid var(--primary); animation: gps-ring 2s ease-out infinite; }
    @keyframes gps-ring { 0%{transform:scale(1);opacity:1} 70%{transform:scale(2.2);opacity:0} 100%{transform:scale(1);opacity:0} }
    .map-layer-btn { position: absolute; top: 8px; right: 8px; z-index: 1000; background: rgba(13,15,18,.9); border: 1px solid var(--border); border-radius: 6px; color: var(--primary); font-size: 9px; font-family: var(--font-mono); font-weight: 700; padding: 4px 8px; cursor: pointer; text-transform: uppercase; letter-spacing:.05em; transition: background var(--tr); }
    .map-layer-btn:hover { background: rgba(23,26,29,.95); }

    /* Setup overlay */
    .setup-overlay { position: fixed; inset: 0; background: rgba(5,7,9,.97); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 2000; padding: 24px; }
    .setup-overlay.hidden { display: none; }
    .setup-title { font-family: var(--font-mono); font-size: 16px; font-weight: 700; color: var(--text); }
    .setup-sub { font-size: 12px; color: var(--muted); text-align: center; max-width: 300px; }
    .setup-input { width: 100%; max-width: 340px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--font-mono); font-size: 13px; padding: 12px 14px; outline: none; }
    .setup-input:focus { border-color: var(--primary); }
    .setup-btn { width: 100%; max-width: 340px; padding: 14px; background: var(--primary); color: #071215; border: none; border-radius: 8px; font-family: var(--font-mono); font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing:.06em; cursor: pointer; transition: background var(--tr); }
    .setup-btn:hover { background: #3d8a96; }

    /* Animowane cyfry */
    @keyframes num-pop { 0%{opacity:.3;transform:scale(.92)} 100%{opacity:1;transform:scale(1)} }
    .num-updated { animation: num-pop .3s ease-out; }
  </style>
</head>
<body>

<!-- Setup overlay -->
<div class="setup-overlay" id="setupOverlay">
  <div style="color:var(--primary)">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="11" r="3.5" fill="currentColor" opacity="0.9"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" stroke="currentColor" stroke-width="1.8" fill="none" opacity="0.6"/></svg>
  </div>
  <div class="setup-title">OBS GPS Widget</div>
  <div class="setup-sub">Wpisz adres serwera Deno Deploy</div>
  <input class="setup-input" type="url" id="setupUrl" placeholder="https://twoja-nazwa.deno.dev" autocomplete="off" spellcheck="false">
  <button class="setup-btn" onclick="applyServer()">Połącz z serwerem</button>
</div>

<!-- Header -->
<div class="header">
  <div class="logo">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="11" r="3" fill="currentColor" opacity="0.9"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" stroke="currentColor" stroke-width="1.8" fill="none" opacity="0.6"/></svg>
    <span class="logo-text">GPS Widget</span>
  </div>
  <div class="header-right">
    <span class="device-label" id="deviceLabel">—</span>
    <div class="status-dot" id="statusDot"></div>
    <span class="clock" id="clockVal">--:--:--</span>
    <button class="btn-cfg" onclick="showSetup()">CFG</button>
  </div>
</div>

<div class="grid">

  <!-- Prędkość -->
  <div class="tile tile-spd">
    <div class="tile-label">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      Prędkość
    </div>
    <div class="tile-val" id="speedVal">--</div>
    <div class="tile-unit">km/h</div>
  </div>

  <!-- Bateria -->
  <div class="tile tile-bat">
    <div class="tile-label">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="7" width="16" height="10" rx="2"/><path d="M22 11v2"/></svg>
      Bateria
    </div>
    <div class="tile-val" id="batVal">--</div>
    <div class="tile-unit" id="batStatus">—</div>
    <div class="bat-bar"><div class="bat-fill" id="batBar" style="width:0%"></div></div>
  </div>

  <!-- Temperatura -->
  <div class="tile tile-temp">
    <div class="tile-label">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/></svg>
      Temperatura
    </div>
    <div class="tile-val" id="tempVal">--</div>
    <div class="tile-unit">°C</div>
    <div class="tile-sub" id="tempDesc">—</div>
  </div>

  <!-- Miasto -->
  <div class="tile tile-city">
    <div class="tile-label">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="11" r="3"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
      Lokalizacja
    </div>
    <div style="font-family:var(--font-mono);font-size:16px;font-weight:700;line-height:1.3;color:var(--text)" id="cityVal">—</div>
    <div class="tile-sub" id="countryVal">—</div>
  </div>

  <!-- Mapa -->
  <div class="tile tile-full tile-map">
    <div class="tile-label">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
      Mapa na żywo
    </div>
    <div class="map-wrap">
      <div id="map"></div>
      <button class="map-layer-btn" id="layerBtn" onclick="toggleLayer()">🛰 Satelita</button>
    </div>
  </div>

</div>

<script>
let SERVER_URL = '';
let fetchTimer = null;
let map = null, gpsMarker = null, accCircle = null, routeLine = null;
let mapInit = false, currentLayer = 'osm';
let lastLat = null, lastLng = null;
const ROUTE_PTS = [];

const LAYERS = {
  osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution:'© OSM', maxZoom:19 }),
  sat: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution:'© Esri', maxZoom:19 })
};

(function(){
  const saved = sessionStorage.getItem('obs_server_url');
  if (saved) { SERVER_URL = saved; document.getElementById('setupOverlay').classList.add('hidden'); startPolling(); }
})();

function showSetup() { document.getElementById('setupOverlay').classList.remove('hidden'); }
function applyServer() {
  const v = document.getElementById('setupUrl').value.trim().replace(/\/$/,'');
  if (!v) return;
  SERVER_URL = v;
  sessionStorage.setItem('obs_server_url', v);
  document.getElementById('setupOverlay').classList.add('hidden');
  startPolling();
}

function startPolling() {
  if (fetchTimer) clearInterval(fetchTimer);
  fetchOnce();
  fetchTimer = setInterval(fetchOnce, 3000);
}

async function fetchOnce() {
  if (!SERVER_URL) return;
  try {
    const r = await fetch(SERVER_URL + '/data', { cache:'no-cache' });
    if (!r.ok) { setStatus('err'); return; }
    applyData(await r.json());
  } catch { setStatus('err'); }
}

function applyData(d) {
  const ago = d.lastUpdate ? Math.round((Date.now() - new Date(d.lastUpdate).getTime()) / 1000) : 999;
  setStatus(ago < 15 ? 'live' : ago < 60 ? 'stale' : 'err');

  document.getElementById('deviceLabel').textContent = d.deviceName || '—';

  setAnim('speedVal', d.speed ?? '--');

  if (d.battery !== null && d.battery !== undefined) {
    setAnim('batVal', d.battery);
    document.getElementById('batStatus').textContent = d.charging ? '⚡ ładowanie' : 'rozładowywanie';
    const bar = document.getElementById('batBar');
    bar.style.width = d.battery + '%';
    bar.style.background = d.battery <= 15 ? '#b84040' : d.battery <= 30 ? '#c8a230' : '#5fa84d';
  }

  if (d.temp !== null && d.temp !== undefined) {
    setAnim('tempVal', d.temp);
    document.getElementById('tempDesc').textContent = d.tempDesc || '—';
  }

  document.getElementById('cityVal').textContent    = d.city    || '—';
  document.getElementById('countryVal').textContent = d.country || '—';

  if (d.lat !== null && d.lat !== undefined) {
    updateMap(d.lat, d.lng, d.accuracy || 10);
  }
}

function setAnim(id, val) {
  const el = document.getElementById(id);
  if (el.textContent !== String(val)) {
    el.textContent = val;
    el.classList.remove('num-updated');
    void el.offsetWidth;
    el.classList.add('num-updated');
  }
}

function setStatus(s) {
  document.getElementById('statusDot').className = 'status-dot' + (s !== 'off' ? ' '+s : '');
}

function tickClock() {
  const t = new Date().toLocaleTimeString('pl', { hour12:false });
  document.getElementById('clockVal').textContent = t;
}
setInterval(tickClock, 1000); tickClock();

function initMap(lat, lng) {
  if (mapInit) return; mapInit = true;
  map = L.map('map', { center:[lat,lng], zoom:15, zoomControl:true, attributionControl:true, dragging:true, scrollWheelZoom:true });
  LAYERS.osm.addTo(map);
  const icon = L.divIcon({ className:'', html:'<div class="gps-pulse-outer"></div>', iconSize:[18,18], iconAnchor:[9,9] });
  gpsMarker = L.marker([lat,lng], { icon }).addTo(map);
  accCircle = L.circle([lat,lng], { radius:10, color:'#4f98a3', fillColor:'#4f98a3', fillOpacity:.08, weight:1 }).addTo(map);
  routeLine = L.polyline([], { color:'#c966a8', weight:3, opacity:.85, lineJoin:'round' }).addTo(map);
}

function updateMap(lat, lng, acc) {
  if (!mapInit) { initMap(lat, lng); return; }
  const ll = [lat, lng];
  gpsMarker.setLatLng(ll);
  accCircle.setLatLng(ll).setRadius(Math.max(acc, 5));
  if (!map._moved) map.setView(ll, map.getZoom(), { animate:true, duration:.8 });
  if (lastLat === null || Math.abs(lat-lastLat) > 0.00005 || Math.abs(lng-lastLng) > 0.00005) {
    ROUTE_PTS.push(ll);
    if (ROUTE_PTS.length > 2000) ROUTE_PTS.shift();
    routeLine.setLatLngs(ROUTE_PTS);
    lastLat = lat; lastLng = lng;
  }
}

function toggleLayer() {
  if (!mapInit) return;
  if (currentLayer === 'osm') {
    LAYERS.osm.remove(); LAYERS.sat.addTo(map); currentLayer = 'sat';
    document.getElementById('layerBtn').textContent = '🗺 Mapa';
  } else {
    LAYERS.sat.remove(); LAYERS.osm.addTo(map); currentLayer = 'osm';
    document.getElementById('layerBtn').textContent = '🛰 Satelita';
  }
}
</script>
</body>
</html>
